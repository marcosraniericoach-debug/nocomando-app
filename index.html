<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner #NoComando V2</title>

  <!-- Tailwind CSS para o Design -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel: o tradutor que ensina o navegador a ler o seu código React -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Mapa de Importações: Diz ao navegador de onde baixar as bibliotecas -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://esm.sh/firebase@10.8.0/app",
        "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
        "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore",
        "lucide-react": "https://esm.sh/lucide-react@0.330.0?external=react"
      }
    }
  </script>
</head>
<body class="bg-neutral-200 antialiased selection:bg-black selection:text-white">

  <!-- A "tela em branco" onde o seu aplicativo será injetado -->
  <div id="root"></div>

  <!-- O Seu Miolo Lógico (React) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { 
      getAuth, 
      signInWithCustomToken, 
      signInAnonymously, 
      onAuthStateChanged 
    } from 'firebase/auth';
    import { 
      getFirestore, 
      collection, 
      addDoc, 
      updateDoc, 
      deleteDoc, 
      doc, 
      onSnapshot,
      setDoc
    } from 'firebase/firestore';
    import { 
      CheckSquare, Square, Plus, Trash2, Loader2, LayoutGrid, ListTodo, 
      FileText, CalendarDays, Clock, Calendar, CalendarRange, Cloud, 
      CheckCircle2, AlertCircle, X, ArrowRight, ArrowLeft, FileUp, 
      RefreshCw, Star, ChevronDown
    } from 'lucide-react';

    // --- CONFIGURAÇÃO FIREBASE ---
    // Nota: Para funcionar perfeitamente no seu GitHub e salvar seus dados reais,
    // você precisará substituir as chaves vazias {} pelas credenciais do seu projeto Firebase.
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'nocomando-planner-v2';

    // --- UTILITÁRIOS DE DATA ---
    const getTodayDateStr = () => {
      const d = new Date();
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const year = d.getFullYear();
      return `${day}/${month}/${year}`;
    };

    const getTodayDayOfWeekStr = () => {
      const days = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      return days[new Date().getDay()];
    };

    const getCurrentMonthYearStr = () => {
      const months = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
      const d = new Date();
      return `${months[d.getMonth()]} ${d.getFullYear()}`;
    };

    const getWeekNumber = (date = new Date()) => {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return String(Math.ceil((((d - yearStart) / 86400000) + 1) / 7));
    };

    const getDateForDayOfWeek = (dayLabel) => {
      const daysMap = { 'Dom': 0, 'Seg': 1, 'Ter': 2, 'Qua': 3, 'Qui': 4, 'Sex': 5, 'Sáb': 6 };
      const targetDay = daysMap[dayLabel];
      if (targetDay === undefined) return getTodayDateStr();

      const d = new Date();
      const currentDay = d.getDay();
      const diff = targetDay - currentDay;
      d.setDate(d.getDate() + diff);

      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const year = d.getFullYear();
      return `${day}/${month}/${year}`;
    };

    // --- CONSTANTES INICIAIS ---
    const getEmptyFpaDay = () => ({
      date: '', 
      foco: '',
      prioridades: Array(5).fill({ text: '', completed: false, fromArea: null }),
      extras: Array(6).fill({ text: '', completed: false, fromArea: null }),
      evitar: '', solucao: '', nota: '', aprendizado: '',
      gratidao1: '', gratidao2: '', gratidao3: ''
    });

    const initialFpa = {
      week: getWeekNumber(),
      days: {
        'Dom': getEmptyFpaDay(), 'Seg': getEmptyFpaDay(), 'Ter': getEmptyFpaDay(),
        'Qua': getEmptyFpaDay(), 'Qui': getEmptyFpaDay(), 'Sex': getEmptyFpaDay(), 'Sáb': getEmptyFpaDay()
      }
    };

    const initialCalendario = {
      month: getCurrentMonthYearStr(),
      grid: {}
    };

    const initialDrd = {
      date: getTodayDateStr(), 
      dayOfWeek: getTodayDayOfWeekStr(),
      grid: {}
    };

    const drdDays = ['seg', 'ter', 'qua', 'qui', 'sex', 'sab', 'dom'];
    const drdPeriods = ['manha', 'tarde', 'noite'];
    const drdPeriodLabels = ['MANHÃ', 'TARDE', 'NOITE'];
    const drdDayLabels = ['SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO', 'DOMINGO'];

    const agendaSemanalHours = Array.from({ length: 19 }, (_, i) => i + 5); 
    const agendaSemanalDays = ['seg', 'ter', 'qua', 'qui', 'sex', 'sab', 'dom'];
    const initialAgendaSemanal = {
      week: getWeekNumber(),
      grid: {}
    };

    const agendaHoursLeft = ['5h.', '6h.', '7h.', '8h.', '9h.', '10h.', '11h.', '12h.', '13h.'];
    const agendaHoursRight = ['14h.', '15h.', '16h.', '17h.', '18h.', '19h.', '20h.', '21h.', '22h.'];
    const allAgendaHours = [...agendaHoursLeft, ...agendaHoursRight];

    const initialAgenda = {
      date: getTodayDateStr(), 
      dayOfWeek: getTodayDayOfWeekStr(),
      tasks: {}
    };

    const fpaDays = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
    const dayMap = { 'Dom': 'dom', 'Seg': 'seg', 'Ter': 'ter', 'Qua': 'qua', 'Qui': 'qui', 'Sex': 'sex', 'Sáb': 'sab' };
    const agendaSemanalDayLabels = ['SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO', 'DOMINGO'];
    const calendarioDayLabels = ['SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO', 'DOMINGO'];

    // --- COMPONENTES AUXILIARES ---
    const Toast = ({ message, type, onClose }) => (
      <div className={`fixed bottom-4 right-4 z-50 flex items-center gap-3 px-4 py-3 rounded-lg shadow-2xl transition-all duration-300 ${type === 'error' ? 'bg-red-600 text-white' : 'bg-black text-white'}`}>
        {type === 'error' ? <AlertCircle className="w-5 h-5" /> : <Cloud className="w-5 h-5 text-green-400" />}
        <span className="font-bold text-sm uppercase tracking-wider">{message}</span>
        <button onClick={onClose} className="ml-2 hover:opacity-70 transition-opacity">
          <X className="w-4 h-4" />
        </button>
      </div>
    );

    const BubbleBox = ({ title, children, className = "", innerClassName = "" }) => (
      <div className={`relative mb-6 ${className}`}>
        <div className="font-bold italic text-xl mb-1 ml-2 tracking-tight uppercase leading-none">{title}</div>
        <div className={`border-[2px] border-black rounded-xl p-5 relative bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] ${innerClassName}`}>
          <div className="absolute -top-[11px] left-8 w-5 h-5 border-t-[2px] border-l-[2px] border-black bg-white transform rotate-45"></div>
          {children}
        </div>
      </div>
    );

    const AutoResizeTextarea = ({ value, onChange, onBlur, className, placeholder, rows = 1 }) => {
      const textareaRef = useRef(null);

      useEffect(() => {
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
          textareaRef.current.style.height = `${textareaRef.current.scrollHeight}px`;
        }
      }, [value]);

      return (
        <textarea
          ref={textareaRef}
          value={value}
          onChange={onChange}
          onBlur={onBlur}
          className={`${className} overflow-hidden resize-none`}
          placeholder={placeholder}
          rows={rows}
        />
      );
    };

    // --- UTILITÁRIOS ---
    const getMonthInfo = (monthStr) => {
      if (!monthStr) return null;
      const str = monthStr.toLowerCase().trim();
      const months = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
      const shortMonths = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];

      let monthIdx = -1;
      for (let i = 0; i < 12; i++) {
        if (str.includes(months[i]) || str.includes(shortMonths[i])) {
          monthIdx = i;
          break;
        }
      }
      if (monthIdx === -1) return null;
      const yearMatch = str.match(/\d{4}/);
      const year = yearMatch ? parseInt(yearMatch[0], 10) : new Date().getFullYear();
      return { month: monthIdx, year };
    };

    // --- COMPONENTE PRINCIPAL ---
    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);
      
      const [activeTab, setActiveTab] = useState('dtq');

      const [tasks, setTasks] = useState([]);
      const [newTask, setNewTask] = useState('');

      const [calendarioData, setCalendarioData] = useState(initialCalendario);
      const [cicloTasks, setCicloTasks] = useState([]);
      const [cicloConfig, setCicloConfig] = useState({ week: getWeekNumber(), dateStart: '', dateEnd: '', area1: '', area2: '', area3: '', area4: '' });
      const [agendaSemanalData, setAgendaSemanalData] = useState(initialAgendaSemanal);
      
      const [activeFpaDay, setActiveFpaDay] = useState(getTodayDayOfWeekStr());
      const [fpaData, setFpaData] = useState(initialFpa);
      
      const [agendaData, setAgendaData] = useState(initialAgenda);
      const [drdData, setDrdData] = useState(initialDrd);

      const [movingTask, setMovingTask] = useState(null); 
      const [copyingToWeekTask, setCopyingToWeekTask] = useState(null);

      const showToast = useCallback((message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      }, []);

      // --- AUTENTICAÇÃO ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error(error);
            showToast("Modo local. Configure o Firebase para salvar dados.", "error");
            setLoading(false);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          if (!currentUser) setLoading(false);
        });

        return () => unsubscribe();
      }, [showToast]);

      // --- BUSCA DE DADOS (FIRESTORE) ---
      useEffect(() => {
        if (!user) return;
        setLoading(true);
        const unsubscribers = [];

        try {
          unsubscribers.push(onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'dtq_tasks'), (snap) => {
            const t = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            t.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
            setTasks(t);
            setLoading(false);
          }, (err) => { console.log(err); setLoading(false); }));

          unsubscribers.push(onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'calendario_config', 'main'), (snap) => {
            if (snap.exists()) setCalendarioData(prev => ({ ...prev, ...snap.data() }));
          }));

          unsubscribers.push(onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'ciclo_config', 'main'), (snap) => {
            if (snap.exists()) {
              const data = snap.data();
              setCicloConfig(prev => ({ ...prev, ...data, week: data.week || getWeekNumber() }));
            }
          }));

          unsubscribers.push(onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'ciclo_tasks'), (snap) => {
            const t = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            t.sort((a, b) => a.createdAt - b.createdAt);
            setCicloTasks(t);
          }));

          unsubscribers.push(onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'agenda_semanal_config', 'main'), (snap) => {
            if (snap.exists()) {
              const data = snap.data();
              setAgendaSemanalData(prev => ({ ...prev, ...data, week: data.week || getWeekNumber() }));
            }
          }));

          unsubscribers.push(onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'fpa_config', 'main'), (snap) => {
            if (snap.exists()) {
              const data = snap.data();
              if (data.days) {
                const d = data.days;
                fpaDays.forEach(day => {
                  if (!d[day]) d[day] = getEmptyFpaDay();
                  if (!d[day].date) d[day].date = getDateForDayOfWeek(day);
                });
                setFpaData({ ...data, days: d });
              } else {
                const migratedDays = {
                  'Dom': getEmptyFpaDay(), 'Seg': getEmptyFpaDay(), 'Ter': getEmptyFpaDay(),
                  'Qua': getEmptyFpaDay(), 'Qui': getEmptyFpaDay(), 'Sex': getEmptyFpaDay(), 'Sáb': getEmptyFpaDay()
                };
                const oldDay = data.dayOfWeek || getTodayDayOfWeekStr();
                migratedDays[oldDay] = { ...getEmptyFpaDay(), ...data };
                fpaDays.forEach(day => { 
                  if (!migratedDays[day].date) migratedDays[day].date = getDateForDayOfWeek(day); 
                });
                const newData = { week: data.week || getWeekNumber(), days: migratedDays };
                setFpaData(newData);
                setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'fpa_config', 'main'), newData, { merge: true });
              }
            } else {
              const newInitial = { ...initialFpa };
              fpaDays.forEach(day => { newInitial.days[day].date = getDateForDayOfWeek(day); });
              setFpaData(newInitial);
            }
          }));

          unsubscribers.push(onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'agenda_config', 'main'), (snap) => {
            if (snap.exists()) {
              const data = snap.data();
              setAgendaData(prev => ({ 
                ...prev, 
                ...data,
                date: data.date || getTodayDateStr()
              }));
            }
          }));

          unsubscribers.push(onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'drd_config', 'main'), (snap) => {
            if (snap.exists()) setDrdData(prev => ({ ...prev, ...snap.data() }));
          }));
        } catch(e) {
            console.error("Modo offline: ", e);
            setLoading(false);
        }

        return () => unsubscribers.forEach(unsub => unsub && unsub());
      }, [user, showToast]);

      // --- PERSISTÊNCIA ---
      const saveToFirestore = async (path, data, showMsg = true) => {
        if (!user) return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, ...path);
          await setDoc(docRef, data, { merge: true });
          if (showMsg) showToast("Alterações salvas!");
        } catch (e) { showToast("Erro ao salvar dados. Verifique a configuração.", "error"); }
      };

      // --- FUNÇÕES DE GESTÃO ---
      const handleAddTask = async (e) => {
        e.preventDefault();
        if (!newTask.trim() || !user) return;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'dtq_tasks'), {
            text: newTask.trim(), completed: false, createdAt: Date.now()
          });
          setNewTask('');
        } catch (e) { showToast("Erro ao adicionar", "error"); }
      };

      const toggleTask = async (id, status) => {
        if (!user) return;
        try { await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'dtq_tasks', id), { completed: !status }); } catch (e) { showToast("Erro ao atualizar", "error"); }
      };

      const deleteTask = async (id) => {
        if (!user) return;
        try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'dtq_tasks', id)); } catch (e) { showToast("Erro ao excluir", "error"); }
      };

      const sendToCicloArea4 = async (task) => {
        if (!user) return;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'ciclo_tasks'), { text: task.text, area: 4, completed: false, createdAt: Date.now() });
          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'dtq_tasks', task.id));
          showToast("Enviado para o Ciclo (Área 4)!");
        } catch (e) { showToast("Erro ao mover", "error"); }
      };

      const cycleTaskArea = async (task) => {
        if (!user) return;
        const nextArea = task.area === 4 ? 1 : task.area + 1;
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ciclo_tasks', task.id), { area: nextArea });
          showToast(`Movido para Área ${nextArea}`);
        } catch (e) { showToast("Erro ao trocar área", "error"); }
      };

      const returnTaskToDtq = async (task) => {
        if (!user) return;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'dtq_tasks'), { text: task.text, completed: false, createdAt: Date.now() });
          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ciclo_tasks', task.id));
          showToast("Devolvido para o DTQ!");
        } catch (e) { showToast("Erro ao devolver", "error"); }
      };

      const sendCicloToFpaExtras = async (task) => {
        if (!user) return;
        const currentDayData = fpaData.days[activeFpaDay];
        const newExtras = [...currentDayData.extras];
        const emptyIdx = newExtras.findIndex(item => item.text.trim() === '');
        if (emptyIdx === -1) { showToast(`FPA de ${activeFpaDay} sem espaço nos Extras!`, "error"); return; }
        try {
          newExtras[emptyIdx] = { text: task.text, completed: false, fromArea: task.area };
          const newDays = { ...fpaData.days, [activeFpaDay]: { ...currentDayData, extras: newExtras } };
          await saveToFirestore(['fpa_config', 'main'], { days: newDays });
          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ciclo_tasks', task.id));
          showToast(`Promovido para FPA (${activeFpaDay} - Extras)!`);
        } catch (e) { showToast("Erro ao enviar para FPA", "error"); }
      };

      const sendCicloToFpaPrioridades = async (task) => {
        if (!user) return;
        const currentDayData = fpaData.days[activeFpaDay];
        const newPrioridades = [...currentDayData.prioridades];
        const emptyIdx = newPrioridades.findIndex(item => item.text.trim() === '');
        if (emptyIdx === -1) { showToast(`FPA de ${activeFpaDay} sem espaço nas Prioridades!`, "error"); return; }
        try {
          newPrioridades[emptyIdx] = { text: task.text, completed: false, fromArea: task.area };
          const newDays = { ...fpaData.days, [activeFpaDay]: { ...currentDayData, prioridades: newPrioridades } };
          await saveToFirestore(['fpa_config', 'main'], { days: newDays });
          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ciclo_tasks', task.id));
          showToast(`Promovido para FPA (${activeFpaDay} - Prioridades)!`);
        } catch (e) { showToast("Erro ao enviar para FPA", "error"); }
      };

      const sendFpaToAgenda = async (listName, index) => {
        if (!user) return;
        const currentDayData = fpaData.days[activeFpaDay];
        const item = currentDayData[listName][index];
        if (!item.text.trim()) return;

        try {
          const weekDay = dayMap[activeFpaDay] || 'seg';
          const weekKey = `5-${weekDay}`;
          
          const newAgendaSemanalGrid = { ...agendaSemanalData.grid };
          const currentWeekTasks = Array.isArray(newAgendaSemanalGrid[weekKey]) ? [...newAgendaSemanalGrid[weekKey]] : [];
          newAgendaSemanalGrid[weekKey] = [...currentWeekTasks, { text: item.text, completed: false, fromArea: item.fromArea }];
          
          const newAgendaSemanalData = { ...agendaSemanalData, grid: newAgendaSemanalGrid };
          setAgendaSemanalData(newAgendaSemanalData);
          await saveToFirestore(['agenda_semanal_config', 'main'], newAgendaSemanalData, false);

          const newList = [...currentDayData[listName]];
          newList[index] = { text: '', completed: false, fromArea: null };
          const newDays = { ...fpaData.days, [activeFpaDay]: { ...currentDayData, [listName]: newList } };
          setFpaData(prev => ({ ...prev, days: newDays }));
          await saveToFirestore(['fpa_config', 'main'], { days: newDays });
          
          showToast("Enviado para Agenda!");
        } catch (e) { showToast("Erro ao enviar para Agenda", "error"); }
      };

      const returnFpaToCiclo = async (listName, index) => {
        if (!user) return;
        const currentDayData = fpaData.days[activeFpaDay];
        const item = currentDayData[listName][index];
        if (!item.text.trim()) return;
        try {
          const targetArea = item.fromArea || 4;
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'ciclo_tasks'), { text: item.text, area: targetArea, completed: false, createdAt: Date.now() });
          
          const newList = [...currentDayData[listName]];
          newList[index] = { text: '', completed: false, fromArea: null };
          const newDays = { ...fpaData.days, [activeFpaDay]: { ...currentDayData, [listName]: newList } };
          
          await saveToFirestore(['fpa_config', 'main'], { days: newDays });
          showToast(`Devolvido para Ciclo (Área ${targetArea})`);
        } catch (e) { showToast("Erro ao devolver tarefa", "error"); }
      };

      const handleFpaChange = (field, value) => {
        const currentDayData = fpaData.days[activeFpaDay];
        const newDays = { ...fpaData.days, [activeFpaDay]: { ...currentDayData, [field]: value } };
        setFpaData(prev => ({ ...prev, days: newDays }));
      };

      const returnAgendaSemanalToCiclo = async (key, index) => {
        if (!user) return;
        const currentTasks = [...(agendaSemanalData.grid[key] || [])];
        const task = currentTasks.splice(index, 1)[0];
        const targetArea = task.fromArea || 4;

        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'ciclo_tasks'), {
            text: task.text,
            area: targetArea,
            completed: false,
            createdAt: Date.now()
          });

          const newAgendaData = { ...agendaSemanalData, grid: { ...agendaSemanalData.grid, [key]: currentTasks } };
          setAgendaSemanalData(newAgendaData);
          await saveToFirestore(['agenda_semanal_config', 'main'], newAgendaData, false);
          showToast(`Devolvido para Ciclo (Área ${targetArea})`);
        } catch (e) { showToast("Erro ao devolver tarefa", "error"); }
      };

                            <div key={day} className="flex-1 border-r border-neutral-100 last:border-r-0 p-2 flex flex-col gap-2 bg-white">
                               {dayTasks.map((t, idx) => (
                                 <div key={idx} className="group flex items-start gap-2 relative">
                                    <button className="mt-0.5 flex-shrink-0" onClick={() => toggleAgendaSemanalTask(key, idx)}>{t.completed ? <CheckSquare className="w-4 h-4 text-black" /> : <Square className="w-4 h-4 text-black" />}</button>
                                    <span className={`flex-1 min-w-0 break-words font-bold text-[10px] uppercase italic leading-tight pt-0.5 ${t.completed ? 'line-through text-neutral-300' : 'text-black'}`}>{t.text}</span>
                                    <div className="hidden group-hover:flex items-center gap-0.5">
                                      <div className="relative">
                                        <button onClick={() => setMovingTask({ key, index: idx, type: 'weekly', hour })} className="p-0.5 hover:bg-neutral-100 rounded"><RefreshCw className="w-3 h-3 text-neutral-400 hover:text-black" /></button>
                                        {movingTask?.key === key && movingTask?.index === idx && movingTask?.type === 'weekly' && (
                                           <div className="absolute left-0 top-full z-50 mt-1 bg-white border-2 border-black shadow-2xl rounded-lg p-1 grid grid-cols-3 gap-0.5 w-32">
                                              {agendaSemanalHours.map(h => (<button key={h} onClick={() => moveAgendaSemanalTaskToHour(key, idx, h)} className="text-[8px] font-black p-0.5 hover:bg-red-600 hover:text-white border border-neutral-100 rounded">{h}h</button>))}
                                              <button onClick={() => setMovingTask(null)} className="col-span-3 text-[7px] uppercase font-bold text-red-600 mt-1 border-t pt-1">Fechar</button>
                                           </div>
                                        )}
                                      </div>
                                      <button onClick={() => deleteAgendaSemanalTask(key, idx)} className="p-0.5 hover:bg-red-50 rounded"><Trash2 className="w-3 h-3 text-neutral-400 hover:text-red-600" /></button>
                                    </div>
                                 </div>
                               ))}
                            </div>
                          )
                        })}
                      </div>
                    ))}
                 </div>
               </div>
            )}

            {activeTab === 'ciclo' && (
              <div>
                 <header className="mb-10 border-b-4 border-black pb-6 flex justify-between items-end">
                    <h2 className="text-4xl font-black italic uppercase tracking-tighter leading-none">Ciclo Semanal</h2>
                    <div className="flex gap-4 font-black uppercase text-xs"><span>Semana:</span><input value={cicloConfig.week} onChange={e => setCicloConfig(p => ({...p, week: e.target.value}))} onBlur={() => saveToFirestore(['ciclo_config', 'main'], cicloConfig)} className="border-b border-black w-12 text-center bg-transparent focus:border-red-600 outline-none transition-colors" /></div>
                 </header>
                 <div className="grid grid-cols-1 md:grid-cols-2 border-[4px] border-black bg-black gap-[4px]">
                    {[1,2,3,4].map(area => (
                      <div key={area} className="bg-white p-6 min-h-[300px] flex flex-col">
                         <div className="flex items-center gap-3 border-b-2 border-black pb-2 mb-6"><span className="font-black italic uppercase text-red-600">ÁREA {area}:</span><input value={cicloConfig[`area${area}`] || ''} onChange={e => setCicloConfig(p => ({...p, [`area${area}`]: e.target.value}))} onBlur={() => saveToFirestore(['ciclo_config', 'main'], cicloConfig)} className="flex-1 font-black uppercase outline-none bg-transparent" placeholder="Nome da Área..." /></div>
                         <div className="flex-1 space-y-3">
                            {cicloTasks.filter(t => t.area === area).map(t => (
                              <div key={t.id} className="flex items-start gap-3 group">
                                 <button className="mt-1 flex-shrink-0" onClick={async () => await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ciclo_tasks', t.id), { completed: !t.completed })}>{t.completed ? <CheckSquare className="w-5 h-5 text-black" /> : <Square className="w-5 h-5" />}</button>
                                 <span className={`flex-1 min-w-0 break-words font-bold text-sm uppercase pt-0.5 ${t.completed ? 'line-through text-neutral-300' : 'text-black'}`}>{t.text}</span>
                                 
                                 <div className="flex items-center gap-1 transition-opacity mt-1 opacity-0 group-hover:opacity-100">
                                   <button onClick={() => cycleTaskArea(t)} title="Trocar Área" className="p-1 hover:bg-neutral-100 rounded text-neutral-400 hover:text-black transition-colors"><RefreshCw className="w-4 h-4" /></button>
                                   <button onClick={() => sendCicloToFpaPrioridades(t)} title="Enviar para FPA (Prioridades)" className="p-1 hover:bg-neutral-100 rounded text-neutral-400 hover:text-red-600 transition-colors"><Star className="w-4 h-4" /></button>
                                   <button onClick={() => sendCicloToFpaExtras(t)} title="Enviar para FPA (Extras)" className="p-1 hover:bg-neutral-100 rounded text-neutral-400 hover:text-black transition-colors"><FileUp className="w-4 h-4" /></button>
                                   <button onClick={() => returnTaskToDtq(t)} title="Devolver para DTQ" className="p-1 hover:bg-neutral-100 rounded text-neutral-400 hover:text-black transition-colors"><ArrowLeft className="w-4 h-4" /></button>
                                   <button onClick={async () => await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ciclo_tasks', t.id))} className="p-1 hover:bg-red-50 rounded text-neutral-400 hover:text-red-600 transition-colors"><Trash2 className="w-4 h-4" /></button>
                                 </div>
                              </div>
                            ))}
                         </div>
                      </div>
                    ))}
                 </div>
              </div>
            )}

            {activeTab === 'drd' && (
              <div className="overflow-x-auto">
                <header className="mb-8 border-b-4 border-red-600 pb-4 flex justify-between items-end min-w-[900px]"><h2 className="text-5xl font-black uppercase italic tracking-tighter leading-none">DRD</h2><div className="font-black text-sm uppercase opacity-40 leading-none">Visão Simplificada</div></header>
                <div className="border-[3px] border-black bg-black min-w-[900px] flex flex-col gap-[3px]"><div className="flex bg-white"><div className="w-12 border-r-2 border-black flex-shrink-0 bg-neutral-100"></div>{drdDayLabels.map(day => (<div key={day} className="flex-1 text-center py-3 font-black uppercase text-sm border-r border-neutral-200 last:border-r-0">{day}</div>))}</div>{drdPeriods.map((period, pIdx) => (<div key={period} className="flex bg-white"><div className="w-12 border-r-2 border-black flex items-center justify-center bg-neutral-50 flex-shrink-0"><span className="-rotate-90 font-black text-xs uppercase tracking-widest">{drdPeriodLabels[pIdx]}</span></div>{drdDays.map(day => (<div key={day} className="flex-1 min-h-[160px] border-r border-neutral-100 last:border-r-0 p-2"><textarea value={drdData.grid[`${period}-${day}`] || ''} onChange={e => setDrdData(p => ({ ...p, grid: { ...p.grid, [`${period}-${day}`]: e.target.value } }))} onBlur={() => saveToFirestore(['drd_config', 'main'], drdData)} className="w-full h-full bg-transparent outline-none resize-none font-medium text-sm leading-tight" placeholder="..." /></div>))}</div>))}</div>
              </div>
            )}

            {activeTab === 'calendario' && (() => {
              const monthInfo = getMonthInfo(calendarioData.month);
              let offset = 0, daysInMonth = 31;
              if (monthInfo) { daysInMonth = new Date(monthInfo.year, monthInfo.month + 1, 0).getDate(); offset = new Date(monthInfo.year, monthInfo.month, 1).getDay(); offset = offset === 0 ? 6 : offset - 1; }
              const totalRows = Math.max(5, Math.ceil((offset + daysInMonth) / 7));
              return (
                <div className="overflow-x-auto">
                  <header className="mb-8 border-b-4 border-black pb-4 flex justify-between items-end min-w-[900px]"><h2 className="text-4xl font-black italic uppercase tracking-tighter leading-none">Agenda Mensal</h2><input value={calendarioData.month} onChange={e => setCalendarioData(p => ({...p, month: e.target.value}))} onBlur={() => saveToFirestore(['calendario_config', 'main'], calendarioData)} placeholder="Mês e Ano..." className="w-48 border-b-2 border-red-600 outline-none font-black text-right uppercase bg-transparent focus:border-black transition-colors" /></header>
                  <div className="border-[3px] border-black bg-black min-w-[900px] flex flex-col gap-[2px]"><div className="flex bg-white">{calendarioDayLabels.map(label => (<div key={label} className="flex-1 text-center py-2 font-black uppercase text-xs border-r border-black last:border-r-0">{label}</div>))}</div>{Array.from({ length: totalRows }).map((_, r) => (<div key={r} className="flex bg-white min-h-[140px]">{[0,1,2,3,4,5,6].map(c => { const dayNum = (r * 7 + c) - offset + 1; const isDay = dayNum >= 1 && dayNum <= daysInMonth; const key = monthInfo ? `${monthInfo.year}-${monthInfo.month + 1}-${dayNum}` : `day-${dayNum}`; const rawVal = calendarioData.grid[key]; const dayTasks = Array.isArray(rawVal) ? rawVal : (rawVal && typeof rawVal === 'string' ? [{text: rawVal, completed: false}] : []); return (<div key={c} className={`flex-1 border-r border-neutral-100 last:border-r-0 p-2 flex flex-col ${!isDay ? 'bg-neutral-50' : ''}`}>{isDay && <span className="font-black text-[10px] mb-1 opacity-40 uppercase">DIA {dayNum}</span>}{isDay && (<div className="flex flex-col gap-1 flex-1 overflow-y-auto" style={{scrollbarWidth: 'none'}}>{dayTasks.map((t, idx) => (<div key={idx} className="group flex items-start gap-1"><button className="mt-0.5 flex-shrink-0" onClick={() => toggleCalendarioTask(key, idx)}>{t.completed ? <CheckSquare className="w-3 h-3 text-black" /> : <Square className="w-3 h-3 text-black" />}</button><span className={`flex-1 min-w-0 break-words font-bold text-[9px] uppercase italic leading-tight pt-0.5 ${t.completed ? 'line-through text-neutral-300' : 'text-black'}`}>{t.text}</span><div className="flex items-center opacity-0 group-hover:opacity-100 transition-opacity">{!t.completed && (<button onClick={() => sendCalendarioToAgendaSemanal(key, idx)} className="p-0.5 text-neutral-400 hover:text-black hover:bg-neutral-100 rounded" title="Copiar para Agenda Semanal (5h)"><Calendar className="w-3 h-3" /></button>)}<button onClick={() => deleteCalendarioTask(key, idx)} className="p-0.5 text-red-600 hover:bg-red-50 rounded" title="Excluir"><Trash2 className="w-3 h-3" /></button></div></div>))}<div className="mt-auto pt-1 border-t border-dashed border-neutral-200 flex items-center gap-1 opacity-40 hover:opacity-100 focus-within:opacity-100 transition-opacity"><Plus className="w-3 h-3 text-neutral-400" /><input placeholder="Nova..." className="w-full bg-transparent outline-none font-bold text-[9px] uppercase italic placeholder:text-neutral-400" onKeyDown={(e) => { if (e.key === 'Enter' && e.target.value.trim()) { addCalendarioTask(key, e.target.value); e.target.value = ''; } }} /></div></div>)}</div>) })}</div>))}</div>
                </div>
              );
            })()}

          </main>

          <footer className="max-w-7xl w-full mx-auto mt-4 px-4 flex justify-between items-center text-[10px] font-black uppercase opacity-40">
            <div className="flex items-center gap-2">
              <div className={`w-2 h-2 rounded-full ${user ? 'bg-green-500' : 'bg-red-500'}`}></div>
              {user ? `ONLINE: ${user.uid.substring(0, 8)}...` : 'DESCONECTADO'}
            </div>
            <div>PLANNER #NOCOMANDO V2.1</div>
          </footer>
        </div>
      );
    }

    // Inicializa e renderiza o aplicativo na tela
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
