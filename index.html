<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>#NoComando Planner</title>
    <!-- Bibliotecas Super Estáveis -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input:focus, textarea:focus { outline: none; }
    </style>
</head>
<body class="bg-neutral-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Ícones Nativos embutidos (Isto elimina qualquer problema de bibliotecas externas quebradas)
        const CheckSquare = (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>;
        const Square = (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>;
        const Plus = (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const Trash2 = (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const ListTodo = (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"></rect><path d="m3 17 2 2 4-4"></path><path d="M13 6h8"></path><path d="M13 12h8"></path><path d="M13 18h8"></path></svg>;
        const LayoutGrid = (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect></svg>;
        const FileText = (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const Clock = (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const Calendar = (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const UserCircle2 = (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="10" r="3"></circle><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"></path></svg>;

        function App() {
            const [activeTab, setActiveTab] = useState('dtq');
            const [tasks, setTasks] = useState([
                { id: 1, text: "BEM-VINDO AO #NOCOMANDO", completed: false },
                { id: 2, text: "O SEU SISTEMA ESTÁ ONLINE E FUNCIONAL!", completed: false }
            ]);
            const [newTask, setNewTask] = useState('');

            const TABS = [
                { id: 'dtq', label: 'DTQ', icon: ListTodo },
                { id: 'ciclo', label: 'Ciclo', icon: LayoutGrid },
                { id: 'fpa', label: 'FPA', icon: FileText },
                { id: 'agenda', label: 'Diária', icon: Clock },
                { id: 'semanal', label: 'Semanal', icon: Calendar }
            ];

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newTask.trim()) return;
                setTasks([{ id: Date.now(), text: newTask.trim(), completed: false }, ...tasks]);
                setNewTask('');
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
            };

            return (
                <div className="h-[100dvh] flex flex-col overflow-hidden bg-neutral-50">
                    <header className="bg-white border-b-4 border-black px-6 py-4 flex justify-between items-center z-50 shrink-0">
                        <h1 className="text-2xl font-black italic tracking-tighter uppercase leading-none">
                            <span className="text-red-600">#</span>NoComando
                        </h1>
                        <UserCircle2 className="w-8 h-8 text-black" />
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-28 no-scrollbar bg-white">
                        {activeTab === 'dtq' && (
                            <div className="animate-in fade-in duration-500">
                                <header className="mb-6 border-b-4 border-red-600 pb-2">
                                    <h2 className="text-4xl font-black italic uppercase tracking-tighter">DTQ</h2>
                                    <p className="text-[10px] font-black uppercase opacity-30 tracking-widest">Descarregar a Mente</p>
                                </header>

                                <form onSubmit={handleAddTask} className="mb-8">
                                    <div className="flex items-center border-b-4 border-black pb-2 group focus-within:border-red-600 transition-all">
                                        <input 
                                            type="text" 
                                            value={newTask}
                                            onChange={(e) => setNewTask(e.target.value)}
                                            placeholder="O QUE ESTÁ NA TUA MENTE?" 
                                            className="w-full bg-transparent border-none text-xl font-bold uppercase italic placeholder:text-neutral-300" 
                                        />
                                        <button type="submit" className="ml-2 p-2 bg-black text-white rounded-full hover:bg-red-600 transition-colors">
                                            <Plus className="w-6 h-6" />
                                        </button>
                                    </div>
                                </form>

                                <div className="space-y-4">
                                    {tasks.map(task => (
                                        <div key={task.id} className={`flex items-start gap-4 p-4 border-2 border-black rounded-2xl transition-all ${task.completed ? 'bg-neutral-100 opacity-40 shadow-none' : 'bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]'}`}>
                                            <button onClick={() => toggleTask(task.id)} className="mt-1">
                                                {task.completed ? <CheckSquare className="w-7 h-7 text-black" /> : <Square className="w-7 h-7 text-black" />}
                                            </button>
                                            <span className={`flex-1 text-lg font-bold italic uppercase leading-tight pt-1 ${task.completed ? 'line-through text-neutral-400' : 'text-black'}`}>
                                                {task.text}
                                            </span>
                                            <button onClick={() => deleteTask(task.id)} className="text-red-600 hover:text-red-800 transition-colors">
                                                <Trash2 className="w-5 h-5" />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab !== 'dtq' && (
                            <div className="flex flex-col items-center justify-center h-full text-center py-20 grayscale opacity-20">
                                <h3 className="text-2xl font-black uppercase italic tracking-tighter">Módulo em breve</h3>
                                <p className="font-bold uppercase text-[10px] mt-2 tracking-widest leading-relaxed">
                                    Sincronizando com a metodologia #NoComando...
                                </p>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-black z-50 px-2 pb-safe">
                        <div className="flex justify-between items-center max-w-md mx-auto py-4">
                            {TABS.map(tab => {
                                const TabIcon = tab.icon;
                                return (
                                    <button 
                                        key={tab.id} 
                                        onClick={() => setActiveTab(tab.id)} 
                                        className={`flex flex-col items-center justify-center flex-1 transition-all ${activeTab === tab.id ? 'text-red-600 scale-110' : 'text-neutral-400'}`}
                                    >
                                        <TabIcon className={`w-6 h-6 mb-1 ${activeTab === tab.id ? 'stroke-[3px]' : ''}`} />
                                        <span className="text-[9px] font-black uppercase tracking-tighter">{tab.label}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
