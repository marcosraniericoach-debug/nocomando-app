<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>#NoComando Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input:focus, textarea:focus { outline: none; }
    </style>
</head>
<body class="bg-neutral-200">
    <div id="root"></div>

    <script type="text/babel" data-presets="react" data-type="module">
        import React, { useState } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        import { 
            SquareCheck, Square, Plus, Trash2, ListTodo, 
            LayoutGrid, FileText, Clock, Calendar, UserCircle2,
            CalendarRange, CalendarDays
        } from 'https://esm.sh/lucide-react@0.344.0';

        function App() {
            const [activeTab, setActiveTab] = useState('dtq');
            const [tasks, setTasks] = useState([
                { id: 1, text: "BEM-VINDO AO #NOCOMANDO", completed: false },
                { id: 2, text: "FOCO TOTAL NA PRODUTIVIDADE", completed: false }
            ]);
            const [newTask, setNewTask] = useState('');

            const TABS = [
                { id: 'dtq', label: 'DTQ', icon: ListTodo },
                { id: 'ciclo', label: 'Ciclo', icon: LayoutGrid },
                { id: 'fpa', label: 'FPA', icon: FileText },
                { id: 'agenda', label: 'Diária', icon: Clock },
                { id: 'semanal', label: 'Semanal', icon: Calendar }
            ];

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newTask.trim()) return;
                setTasks([{ id: Date.now(), text: newTask.trim(), completed: false }, ...tasks]);
                setNewTask('');
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
            };

            return (
                <div className="h-[100dvh] flex flex-col overflow-hidden bg-neutral-50">
                    <header className="bg-white border-b-4 border-black px-6 py-4 flex justify-between items-center z-50 shrink-0">
                        <h1 className="text-2xl font-black italic tracking-tighter uppercase leading-none">
                            <span className="text-red-600">#</span>NoComando
                        </h1>
                        <UserCircle2 className="w-8 h-8 text-black" />
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-28 no-scrollbar bg-white">
                        {activeTab === 'dtq' && (
                            <div className="animate-in fade-in duration-500">
                                <header className="mb-6 border-b-4 border-red-600 pb-2">
                                    <h2 className="text-4xl font-black italic uppercase tracking-tighter">DTQ</h2>
                                    <p className="text-[10px] font-black uppercase opacity-30 tracking-widest">Descarregar a Mente</p>
                                </header>

                                <form onSubmit={handleAddTask} className="mb-8">
                                    <div className="flex items-center border-b-4 border-black pb-2 group focus-within:border-red-600 transition-all">
                                        <input 
                                            type="text" 
                                            value={newTask}
                                            onChange={(e) => setNewTask(e.target.value)}
                                            placeholder="O QUE ESTÁ NA TUA MENTE?" 
                                            className="w-full bg-transparent border-none text-xl font-bold uppercase italic placeholder:text-neutral-300" 
                                        />
                                        <button type="submit" className="ml-2 p-2 bg-black text-white rounded-full">
                                            <Plus />
                                        </button>
                                    </div>
                                </form>

                                <div className="space-y-4">
                                    {tasks.map(task => (
                                        <div key={task.id} className={`flex items-start gap-4 p-4 border-2 border-black rounded-2xl transition-all ${task.completed ? 'bg-neutral-100 opacity-40 shadow-none' : 'bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]'}`}>
                                            <button onClick={() => toggleTask(task.id)} className="mt-1">
                                                {task.completed ? <SquareCheck className="w-7 h-7 text-black" /> : <Square className="w-7 h-7 text-black" />}
                                            </button>
                                            <span className={`flex-1 text-lg font-bold italic uppercase leading-tight pt-1 ${task.completed ? 'line-through' : ''}`}>
                                                {task.text}
                                            </span>
                                            <button onClick={() => deleteTask(task.id)} className="text-red-600">
                                                <Trash2 className="w-5 h-5" />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab !== 'dtq' && (
                            <div className="flex flex-col items-center justify-center h-full text-center py-20 grayscale opacity-20">
                                <h3 className="text-2xl font-black uppercase italic tracking-tighter">Módulo em breve</h3>
                                <p className="font-bold uppercase text-[10px] mt-2 tracking-widest leading-relaxed">
                                    Sincronizando com a metodologia #NoComando...
                                </p>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-black z-50 px-2 pb-safe">
                        <div className="flex justify-between items-center max-w-md mx-auto py-4">
                            {TABS.map(tab => {
                                const TabIcon = tab.icon;
                                return (
                                    <button 
                                        key={tab.id} 
                                        onClick={() => setActiveTab(tab.id)} 
                                        className={`flex flex-col items-center justify-center flex-1 transition-all ${activeTab === tab.id ? 'text-red-600 scale-110' : 'text-neutral-400'}`}
                                    >
                                        <TabIcon className={`w-6 h-6 mb-1 ${activeTab === tab.id ? 'stroke-[3px]' : ''}`} />
                                        <span className="text-[9px] font-black uppercase tracking-tighter">{tab.label}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </nav>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
